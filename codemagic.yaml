workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Force iOS 15.0 and Install Pods
        script: |
          # Este script força a versão 15.0 em todos os lugares necessários
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/Runner.xcodeproj/project.pbxproj
          cd ios && pod install
      - name: Flutter build iOS (Simulator)
        script: |
          # Build para simulador não exige conta paga da Apple nem assinatura
          flutter build ios --simulator --debug
    artifacts:
      - build/ios/iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - seu-email@exemplo.com # Mude para seu e-mail
