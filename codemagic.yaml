workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Patch iOS Version (SPM)
        script: |
          # Força a versão 15.0 em todos os arquivos de configuração do iOS
          find ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
      - name: Flutter build iOS (Simulator)
        script: |
          # O build vai gerenciar o Swift Package Manager automaticamente
          flutter build ios --simulator --debug --no-codesign
    artifacts:
      - build/ios/iphonesimulator/*.app
    publishing:
      email:
        recipients:
          - seu-email@exemplo.com # Mude para seu e-mail
